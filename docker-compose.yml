version: '3.9'
services:
  api-gateway:
    build: ./api-gateway
    environment:
      API_GATEWAY_PORT: 8080
      INGESTION_BASE_URL: http://ingestion-service:8081
      RECON_BASE_URL: http://reconciliation-engine:8082
      CLOUDFLARE_CACHE_CONTROL: public, max-age=30
    ports:
      - '8080:8080'
    depends_on:
      - ingestion-service
      - reconciliation-engine

  ingestion-service:
    build: ./ingestion-service
    environment:
      INGESTION_SERVICE_PORT: 8081
      SQLITE_PATH: /data/reconciliation.db
    volumes:
      - ingestion-data:/data
    ports:
      - '8081:8081'

  reconciliation-engine:
    build: ./reconciliation-engine
    environment:
      RECON_ENGINE_PORT: 8082
      INGESTION_BASE_URL: http://ingestion-service:8081
      OPENAI_API_KEY: sk-free-placeholder
      OPENAI_BASE_URL: https://api.openai.com/v1
    ports:
      - '8082:8082'
    depends_on:
      - ingestion-service

  reporting-service:
    build: ./reporting-service
    environment:
      REPORTING_SERVICE_PORT: 8083
      RECON_BASE_URL: http://reconciliation-engine:8082
    ports:
      - '8083:8083'
    depends_on:
      - reconciliation-engine

  frontend:
    build: ./frontend
    ports:
      - '5173:5173'
    depends_on:
      - api-gateway

volumes:
  ingestion-data:
